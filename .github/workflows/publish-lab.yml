name: Publish ferret-lab image

on:
  push:
    branches:
      - main
    paths:
      - 'src/apps/lab/**'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ferret-lab
        uses: docker/build-push-action@v5
        with:
          context: src/apps/lab
          file: src/apps/lab/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/ferret-lab:latest
            ghcr.io/${{ github.repository_owner }}/ferret-lab:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

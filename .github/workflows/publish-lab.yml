name: Publish ferret-lab image

on:
  push:
    branches:
      - main
    paths:
      - 'src/apps/lab/**'
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/ferret-lab:latest"
          TAGS="${TAGS},ghcr.io/${{ github.repository_owner }}/ferret-lab:${{ github.sha }}"
          # On a version tag push (e.g. v1.0), also tag the image with that version
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="${TAGS},ghcr.io/${{ github.repository_owner }}/ferret-lab:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push ferret-lab
        uses: docker/build-push-action@v5
        with:
          context: src/apps/lab
          file: src/apps/lab/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

services:
  # ── Docker exec shim ───────────────────────────────────────────────────────
  # Custom Python HTTP proxy that allows ONLY the Docker API calls required
  # for `docker exec` against the hardcoded ferret-lab container:
  #   POST /containers/ferret-lab/exec   — exec-create
  #   POST /exec/<id>/start              — exec-start  (handles hijacked streams)
  #   POST /exec/<id>/resize             — exec-resize
  #   GET  /exec/<id>/json               — exec-inspect
  # Everything else — including POST /containers/create (the RCE vector) and
  # GET /containers/json — is blocked with HTTP 403.
  # The allowed container name is configurable via ALLOWED_CONTAINER env var.
  docker-shim:
    build:
      context: src/apps/docker-shim
      dockerfile: Dockerfile
    image: ferret-docker-shim:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - docker-internal
    restart: unless-stopped

  api:
    build:
      context: src/apps/api
      dockerfile: Dockerfile
    image: ferret-api:latest
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:1337:1337"
    environment:
      PROXY_HOST: ${PROXY_HOST:-127.0.0.1}
      PROXY_PORT: ${PROXY_PORT:-1337}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-3-flash-preview}
      FERRET_TESTS_DIR: /data/tests
      FERRET_WORKSPACES_DIR: /data/workspaces
      FERRET_SANDBOX_CONTAINER: ferret-lab
      # Route Docker CLI calls through the exec shim instead of the raw socket.
      DOCKER_HOST: tcp://docker-shim:2375
    volumes:
      - ${FERRET_DATA_DIR:-./data}:/data
    networks:
      - default
      - docker-internal
    depends_on:
      - docker-shim
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  ui:
    build:
      context: src/apps/ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SIGINT_URL: ${NEXT_PUBLIC_SIGINT_URL:-}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-dev}
    image: ferret-ui:latest
    ports:
      - "127.0.0.1:${UI_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  lab:
    # Pre-built image is published to GHCR by .github/workflows/publish-lab.yml.
    # To build locally instead (e.g. when modifying the lab image), set:
    #   FERRET_LAB_IMAGE=ferret-lab:local in .env, then run: just build-lab
    image: ${FERRET_LAB_IMAGE:-ghcr.io/synlace/ferret-lab:latest}
    container_name: ferret-lab
    volumes:
      - ${FERRET_DATA_DIR:-./data}/workspaces:/data/workspaces
      - ${FERRET_DATA_DIR:-./data}/workspaces:/workspaces
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_PTRACE
    restart: unless-stopped
    depends_on:
      - api

# No named volumes — data is bind-mounted to ${FERRET_DATA_DIR:-./data} on the host.
# This makes ./data/tests, ./data/mitmproxy, ./data/workspaces, etc. directly accessible for editing.
# The lab container also gets ./data/workspaces mounted at /workspaces so scripts/tests
# written by the AI are accessible at the same path the API uses when building docker exec commands.

networks:
  default: {}
  docker-internal:
    internal: true
